services:
  db:
    image: postgres:17
    container_name: metadata-tool-db
    environment:
      POSTGRES_USER: metadata_tool
      POSTGRES_PASSWORD: password
      POSTGRES_DB: metadata_tool
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metadata_tool"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgcat:
    image: ghcr.io/postgresml/pgcat:latest
    container_name: metadata-tool-pgcat
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:6432:6432"
    volumes:
      - ./pgcat.toml:/etc/pgcat/pgcat.toml:ro
    command: ["pgcat", "/etc/pgcat/pgcat.toml"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
