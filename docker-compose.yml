services:
  db:
    image: postgres:17
    container_name: metadata-tool-db
    environment:
      POSTGRES_USER: metadata_tool
      POSTGRES_PASSWORD: password
      POSTGRES_DB: metadata_tool
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metadata_tool"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
